name: Enforce Branch Strategy

on:
    pull_request:
        branches:
            - develop

jobs:
    check-target-branch:
        runs-on: ubuntu-latest
        permissions: {}
        steps:
            - name: Block PRs from develop
              if: github.head_ref == 'develop'
              run: |
                  echo "::error::Open PRs into 'develop' from short-lived feature branches only."
                  echo "::error::Do not use 'develop' as the source branch for regular pull requests."
                  exit 1

            - name: Branch strategy check passed
              if: github.head_ref != 'develop'
              run: echo "Branch strategy check passed."
