name: Deploy to GitHub Pages (Staging)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate static site (staging)
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: /astro-hankey-2/staging/
          NUXT_IMAGE_REPOSITORY: firebase
          NUXT_PUBLIC_APP_ENV: staging
          NUXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NUXT_PUBLIC_FIREBASE_API_KEY }}
          NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NUXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NUXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NUXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NUXT_PUBLIC_FIREBASE_APP_ID }}
      - name: Prepare staging deployment directory
        run: |
          mkdir -p .output/staging-deploy/staging
          cp -r .output/public/. .output/staging-deploy/staging/
          touch .output/staging-deploy/.nojekyll
      - name: Deploy to gh-pages (staging subfolder)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/staging-deploy
          keep_files: true
